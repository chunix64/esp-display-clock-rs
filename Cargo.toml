[package]
edition      = "2024"
name         = "esp-display-clock-rs"
rust-version = "1.88"
version      = "0.1.0"

[[bin]]
name = "esp-display-clock-rs"
path = "./src/main.rs"

[dependencies]
esp-hal = { version = "~1.1.1", features = ["esp32", "unstable"] }
esp-bootloader-esp-idf = { version = "0.5.0", features = ["esp32"] }
esp-alloc = { version = "0.10.0", features = ["esp32"] }
esp-rtos = { version = "0.3.0", features = ["esp32", "embassy"] }

embedded-hal = "1.0.0"
embedded-hal-async = "1.0.0"
embedded-hal-bus = "0.3.0"
embedded-graphics = "0.8.2"
embassy-executor = "0.10.0"
embassy-time = "0.5.1"

static_cell = "2.1.1"
critical-section = "1.2.0"

esp-println = { version = "0.17.0", features = ["esp32", "log-04"] }
log = "0.4.29"

mipidsi = "0.10.0"
mousefood = { version = "0.5.0", default-features = false, features = ["fonts"] }
ratatui = { version = "0.30.0", default-features = false }

chrono = { version = "0.4.44", default-features = false }
chrono-tz = { version = "0.10.4", default-features = false }

# For fine tuning these settings, please refer to https://doc.rust-lang.org/cargo/reference/profiles.html
[profile.dev]
# The default debug profile is too slow and too big for resource-constrained devices.
# Always build with some optimizations enabled.
opt-level = "s"

[profile.release]
codegen-units = 1     # LLVM can perform better optimizations using a single thread
debug         = 2     # prefer slower builds but better debugging experience
lto           = 'fat'
opt-level     = 's'
